5, 1.5472625494003296], [-0.05537489429116249, 1.4205207824707031, 1.5469880104064941]]], "color": "#ff9800", "n_sub": 200, "n_total": 1000, "step": 5}];
const N_PANELS = DATASETS.length;

// Layout: 3 panels side by side
const panels = [];
for (let pi = 0; pi < N_PANELS; pi++) {
  const ds = DATASETS[pi];
  const w = window.innerWidth / N_PANELS;
  const h = window.innerHeight - 40;
  
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(w, h);
  renderer.setPixelRatio(devicePixelRatio);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.left = (pi * w) + 'px';
  renderer.domElement.style.top = '0px';
  renderer.domElement.style.borderRight = '1px solid #333';
  document.body.appendChild(renderer.domElement);
  
  // Label
  const label = document.createElement('div');
  label.className = 'label';
  label.style.left = (pi * w + 8) + 'px';
  label.innerHTML = '<b style="color:'+ds.color+'">'+ds.name+'</b> ('+ds.n_total+' frames)';
  document.body.appendChild(label);
  
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);
  const camera = new THREE.PerspectiveCamera(50, w/h, 0.01, 100);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  scene.add(new THREE.GridHelper(5, 20, 0x1f2937, 0x161b22));
  
  const color = new THREE.Color(ds.color);
  const jMat = new THREE.MeshPhongMaterial({color});
  const joints = [];
  for (let j = 0; j < 24; j++) {
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), jMat);
    scene.add(s); joints.push(s);
  }
  const bMat = new THREE.LineBasicMaterial({color, linewidth:2});
  const bones = [];
  for (let b of BONES) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,0], 3));
    const l = new THREE.Line(g, bMat);
    scene.add(l); bones.push({l, g, b});
  }
  
  // Init camera
  if (ds.frames.length > 0) {
    const p = ds.frames[0][0];
    controls.target.set(p[0], p[1]+0.5, p[2]);
    camera.position.set(p[0]+2, p[1]+1.5, p[2]+2);
    controls.update();
  }
  
  panels.push({renderer, scene, camera, controls, joints, bones, ds});
}

let playing = true, spd = 1, iv = null;

function showAll(pct) {
  for (let panel of panels) {
    const ds = panel.ds;
    const idx = Math.min(Math.floor(pct / 100 * ds.n_sub), ds.n_sub - 1);
    const f = ds.frames[idx];
    for (let j = 0; j < 24; j++) {
      if (f[j]) panel.joints[j].position.set(f[j][0], f[j][1], f[j][2]);
    }
    for (let {l, g, b} of panel.bones) {
      if (f[b[0]] && f[b[1]]) {
        const p = g.attributes.position.array;
        p[0]=f[b[0]][0];p[1]=f[b[0]][1];p[2]=f[b[0]][2];
        p[3]=f[b[1]][0];p[4]=f[b[1]][1];p[5]=f[b[1]][2];
        g.attributes.position.needsUpdate = true;
      }
    }
  }
  document.getElementById('slider').value = pct;
  document.getElementById('finfo').textContent = Math.round(pct) + '%';
}

let pct = 0;
function tick() { pct = (pct + 0.5 * spd) % 100; showAll(pct); }
function start() { if (iv) clearInterval(iv); iv = setInterval(tick, 1000/24); }
window.togglePlay = function() { playing=!playing; if(playing) start(); else clearInterval(iv); };
window.seekPct = function(v) { pct = parseFloat(v); showAll(pct); };
window.setSpd = function(s) { spd = s; if (playing) start(); };

showAll(0); start();

(function animate() {
  requestAnimationFrame(animate);
  for (let p of panels) {
    p.controls.update();
    p.renderer.render(p.scene, p.camera);
  }
})();

addEventListener('resize', () => {
  const w = innerWidth / N_PANELS;
  const h = innerHeight - 40;
  panels.forEach((p, i) => {
    p.camera.aspect = w/h;
    p.camera.updateProjectionMatrix();
    p.renderer.setSize(w, h);
    p.renderer.domElement.style.left = (i*w)+'px';
  });
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});
</script>
