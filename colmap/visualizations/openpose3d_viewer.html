1.28, 1.789], [-0.425, 1.02, 0.172], [-0.359, 0.958, 0.182], [-0.156, 1.085, 0.254], [-0.129, 1.189, 0.186], [-0.096, 1.227, 0.191], [0.055, 1.336, 0.236]], [[-0.37, 1.394, 1.661], [-0.135, 1.251, 1.716], [-0.132, 1.457, 1.674], [0.018, 1.617, 1.461], [-0.013, 1.724, 1.228], [-0.122, 1.047, 1.711], [0.016, 0.929, 1.472], [0.034, 0.875, 1.236], [-0.019, 1.241, 1.151], [-0.016, 1.374, 1.156], [-0.087, 1.314, 0.726], [0.007, 1.322, 0.291], [-0.007, 1.107, 1.153], [-0.102, 1.084, 0.715], [-0.215, 1.062, 0.29], [-0.379, 1.427, 1.729], [-0.397, 1.363, 1.695], [-0.294, 1.356, 1.78], [-0.42, 1.276, 1.792], [-0.426, 1.023, 0.177], [-0.361, 0.963, 0.185], [-0.156, 1.087, 0.251], [-0.132, 1.191, 0.186], [-0.093, 1.219, 0.194], [0.054, 1.337, 0.239]]];
const BONES = [[0, 1], [1, 2], [2, 3], [3, 4], [1, 5], [5, 6], [6, 7], [1, 8], [8, 9], [9, 10], [10, 11], [8, 12], [12, 13], [13, 14], [0, 15], [0, 16], [15, 17], [16, 18], [14, 19], [19, 20], [14, 21], [11, 22], [22, 23], [11, 24]];
const N = 500;
const STEP = 2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);
const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping=true; ctrl.dampingFactor=0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
scene.add(new THREE.GridHelper(5, 20, 0x1f2937, 0x161b22));

// Joint spheres
const jointMat = new THREE.MeshPhongMaterial({color:0x4fc3f7});
const joints = [];
for(let i=0;i<25;i++) {
  const s = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), jointMat);
  scene.add(s); joints.push(s);
}

// Bone lines
const boneMat = new THREE.LineBasicMaterial({color:0x4fc3f7, linewidth:2});
const boneLines = [];
for(let b of BONES) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,0], 3));
  const line = new THREE.Line(geo, boneMat);
  scene.add(line); boneLines.push({line, geo, b});
}

// Trail (trajectory of MidHip)
const trailPts = FRAMES.map(f => new THREE.Vector3(f[8][0], f[8][1], f[8][2]));
const trailGeo = new THREE.BufferGeometry().setFromPoints(trailPts);
scene.add(new THREE.Line(trailGeo, new THREE.LineBasicMaterial({color:0x333355, transparent:true, opacity:0.3})));

let idx=0, playing=true, spd=1, iv=null;

function show(i) {
  const f = FRAMES[i];
  for(let j=0;j<25;j++) joints[j].position.set(f[j][0], f[j][1], f[j][2]);
  for(let {line,geo,b} of boneLines) {
    const p = geo.attributes.position.array;
    p[0]=f[b[0]][0]; p[1]=f[b[0]][1]; p[2]=f[b[0]][2];
    p[3]=f[b[1]][0]; p[4]=f[b[1]][1]; p[5]=f[b[1]][2];
    geo.attributes.position.needsUpdate=true;
  }
  document.getElementById('slider').value=i;
  document.getElementById('finfo').textContent=`${i*STEP+1}/1000`;
}

function tick() { idx=(idx+1)%N; show(idx); }
function start() { if(iv)clearInterval(iv); iv=setInterval(tick, 1000/(24*spd)); }
window.togglePlay = function() {
  playing=!playing;
  document.getElementById('btnPlay').textContent=playing?'⏸':'▶';
  if(playing) start(); else clearInterval(iv);
};
window.seek = function(v) { idx=parseInt(v); show(idx); };
window.setSpd = function(s) { spd=s; if(playing)start(); };

// Center view
const c = new THREE.Vector3(0, 1.5, 1);
ctrl.target.copy(c);
camera.position.set(c.x+2, c.y+1, c.z+2);
ctrl.update();

show(0); start();
(function a(){requestAnimationFrame(a);ctrl.update();renderer.render(scene,camera);})();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'){idx=Math.min(idx+1,N-1);show(idx);}
  if(e.code==='ArrowLeft'){idx=Math.max(idx-1,0);show(idx);}
});
</script>
