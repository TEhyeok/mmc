const B = [[0, 1], [0, 2], [1, 3], [2, 4], [5, 6], [5, 7], [6, 8], [7, 9], [8, 10], [5, 11], [6, 12], [11, 12], [11, 13], [12, 14], [13, 15], [14, 16]];
const N=500, ST=2, NJ=17;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d1117);
const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.01,100);
const ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(devicePixelRatio);
document.body.appendChild(ren.domElement);
const ctrl=new OrbitControls(cam,ren.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=0.08;
scene.add(new THREE.AmbientLight(0xffffff,0.6));
scene.add(new THREE.GridHelper(5,20,0x1f2937,0x161b22));

const jM=new THREE.MeshPhongMaterial({color:0xab47bc});
const js=[];
for(let i=0;i<NJ;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(0.015,8,8),jM);scene.add(s);js.push(s);}

const bM=new THREE.LineBasicMaterial({color:0xab47bc,linewidth:2});
const bs=[];
for(let b of B){const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute([0,0,0,0,0,0],3));const l=new THREE.Line(g,bM);scene.add(l);bs.push({l,g,b});}

// Trail
const tp=F.map(f=>new THREE.Vector3(f[11][0],f[11][1],f[11][2]));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(tp),new THREE.LineBasicMaterial({color:0x332244,transparent:true,opacity:0.3})));

let idx=0,playing=true,spd=1,iv=null;
function show(i){const f=F[i];for(let j=0;j<NJ;j++)js[j].position.set(f[j][0],f[j][1],f[j][2]);for(let{l,g,b}of bs){const p=g.attributes.position.array;p[0]=f[b[0]][0];p[1]=f[b[0]][1];p[2]=f[b[0]][2];p[3]=f[b[1]][0];p[4]=f[b[1]][1];p[5]=f[b[1]][2];g.attributes.position.needsUpdate=true;}document.getElementById('slider').value=i;document.getElementById('finfo').textContent=`${i*ST+1}/999`;}
function tick(){idx=(idx+1)%N;show(idx);}
function start(){if(iv)clearInterval(iv);iv=setInterval(tick,1000/(24*spd));}
window.togglePlay=function(){playing=!playing;document.getElementById('btnPlay').textContent=playing?'⏸':'▶';if(playing)start();else clearInterval(iv);};
window.seek=function(v){idx=parseInt(v);show(idx);};
window.setSpd=function(s){spd=s;if(playing)start();};

const c=new THREE.Vector3(0,1.5,1);ctrl.target.copy(c);cam.position.set(c.x+2,c.y+1,c.z+2);ctrl.update();
show(0);start();
(function a(){requestAnimationFrame(a);ctrl.update();ren.render(scene,cam);})();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}if(e.code==='ArrowRight'){idx=Math.min(idx+1,N-1);show(idx);}if(e.code==='ArrowLeft'){idx=Math.max(idx-1,0);show(idx);}});
