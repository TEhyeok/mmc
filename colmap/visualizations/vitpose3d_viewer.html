.3125219828033714, 2.1237613970579043], [-1.2696865321486348, 3.3175076207775755, 2.0921323283249187], [-1.48437223362667, 3.4669660279495838, 2.1919046000684923], [-1.2967548010435272, 3.571535141090456, 2.059955543790652], [-1.3849272313086305, 3.3313218815484493, 1.5869542962625378], [-0.9443327280098678, 3.3339528594335026, 1.5842305303814757], [-0.06325839661993651, 0.7308727617625829, 1.750638700130008], [-0.5947356415824001, 3.249228031482096, 1.0206809611905139], [-0.5093496903021534, 2.8330710568294193, 0.2612603933932534], [0.009145528176367696, 1.702052851665692, 1.186444583283462], [0.03501757246364273, 1.1862635713628344, 1.137372231366248], [0.04761805891183349, 1.382191112554346, 1.0947062708623636], [0.11865695687510179, 1.4923673491072371, 0.5452859232456614], [0.111032271144994, 1.5934821159375998, 0.5495879240429887], [0.25760726743175005, 1.900867981153988, -0.2251685565395512], [0.2773559978756188, 1.8877101875367208, -0.017943821682420907]]];
const BONES = [[0, 1], [0, 2], [1, 3], [2, 4], [5, 6], [5, 7], [6, 8], [7, 9], [8, 10], [5, 11], [6, 12], [11, 12], [11, 13], [12, 14], [13, 15], [14, 16]];
const N = 500;
const STEP = 2;
const NJ = 17;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);
const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping=true; ctrl.dampingFactor=0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
scene.add(new THREE.GridHelper(5, 20, 0x1f2937, 0x161b22));

const jMat = new THREE.MeshPhongMaterial({color:0x66bb6a});
const joints = [];
for(let i=0;i<NJ;i++) {
  const s = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), jMat);
  scene.add(s); joints.push(s);
}

const bMat = new THREE.LineBasicMaterial({color:0x66bb6a, linewidth:2});
const bLines = [];
for(let b of BONES) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,0], 3));
  const line = new THREE.Line(geo, bMat);
  scene.add(line); bLines.push({line, geo, b});
}

let idx=0, playing=true, spd=1, iv=null;

function show(i) {
  const f = FRAMES[i];
  for(let j=0;j<NJ;j++) joints[j].position.set(f[j][0], f[j][1], f[j][2]);
  for(let {line,geo,b} of bLines) {
    const p = geo.attributes.position.array;
    p[0]=f[b[0]][0]; p[1]=f[b[0]][1]; p[2]=f[b[0]][2];
    p[3]=f[b[1]][0]; p[4]=f[b[1]][1]; p[5]=f[b[1]][2];
    geo.attributes.position.needsUpdate=true;
  }
  document.getElementById('slider').value=i;
  document.getElementById('finfo').textContent=`${i*STEP+1}/999`;
}

function tick() { idx=(idx+1)%N; show(idx); }
function start() { if(iv)clearInterval(iv); iv=setInterval(tick, 1000/(24*spd)); }
window.togglePlay = function() {
  playing=!playing;
  document.getElementById('btnPlay').textContent=playing?'⏸':'▶';
  if(playing) start(); else clearInterval(iv);
};
window.seek = function(v) { idx=parseInt(v); show(idx); };
window.setSpd = function(s) { spd=s; if(playing)start(); };

const c = new THREE.Vector3(0, 1.5, 1);
ctrl.target.copy(c);
camera.position.set(c.x+2, c.y+1, c.z+2);
ctrl.update();

show(0); start();
(function a(){requestAnimationFrame(a);ctrl.update();renderer.render(scene,camera);})();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'){idx=Math.min(idx+1,N-1);show(idx);}
  if(e.code==='ArrowLeft'){idx=Math.max(idx-1,0);show(idx);}
});
</script>
