const N=500, ST=2, NJ=24;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d1117);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.01,100);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);
const ctrl=new OrbitControls(camera,renderer.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=0.08;

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dl=new THREE.DirectionalLight(0xffffff,0.5);
dl.position.set(5,10,5);scene.add(dl);
scene.add(new THREE.GridHelper(5,20,0x1f2937,0x161b22));

// Joint colors: torso=orange, arms=blue/green, legs=red/purple
const JCOLORS = [
  0xff9800, // 0 Pelvis
  0xe91e63, 0x9c27b0, // 1,2 L/R Hip
  0xff9800, // 3 Spine1
  0xe91e63, 0x9c27b0, // 4,5 L/R Knee
  0xff9800, // 6 Spine2
  0xe91e63, 0x9c27b0, // 7,8 L/R Ankle
  0xff9800, // 9 Spine3
  0xe91e63, 0x9c27b0, // 10,11 L/R Foot
  0xff9800, // 12 Neck
  0x2196f3, 0x4caf50, // 13,14 L/R Collar
  0xff9800, // 15 Head
  0x2196f3, 0x4caf50, // 16,17 L/R Shoulder
  0x2196f3, 0x4caf50, // 18,19 L/R Elbow
  0x2196f3, 0x4caf50, // 20,21 L/R Wrist
  0x2196f3, 0x4caf50, // 22,23 L/R Hand
];

const js=[];
for(let i=0;i<NJ;i++){
  const mat=new THREE.MeshPhongMaterial({color:JCOLORS[i]});
  const r = (i===0||i===15) ? 0.025 : 0.018;
  const s=new THREE.Mesh(new THREE.SphereGeometry(r,10,10),mat);
  scene.add(s);js.push(s);
}

// Bone lines with parent colors
const bs=[];
for(let b of B){
  const mat=new THREE.LineBasicMaterial({color:JCOLORS[b[0]],linewidth:2,transparent:true,opacity:0.8});
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute([0,0,0,0,0,0],3));
  const l=new THREE.Line(g,mat);
  scene.add(l);bs.push({l,g,b});
}

// Joint labels (only key ones)
const labelJoints = [0,12,15,16,17,18,19,20,21,1,2,4,5,7,8];
const labels = [];
for(let ji of labelJoints) {
  const c=document.createElement('canvas');c.width=256;c.height=48;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#'+JCOLORS[ji].toString(16).padStart(6,'0');
  ctx.font='bold 20px sans-serif';ctx.textAlign='center';
  ctx.fillText(NAMES[ji],128,30);
  const tex=new THREE.CanvasTexture(c);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.7}));
  spr.scale.set(0.8,0.15,1);
  scene.add(spr);
  labels.push({spr,ji});
}

// Pelvis trail
const trailPts=F.map(f=>new THREE.Vector3(f[0][0],f[0][1],f[0][2]));
scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints(trailPts),
  new THREE.LineBasicMaterial({color:0x332211,transparent:true,opacity:0.2})
));

let idx=0,playing=true,spd=1,iv=null;
const angleDiv=document.getElementById('angleList');

function show(i){
  const f=F[i];
  for(let j=0;j<NJ;j++) js[j].position.set(f[j][0],f[j][1],f[j][2]);
  for(let{l,g,b}of bs){
    const p=g.attributes.position.array;
    p[0]=f[b[0]][0];p[1]=f[b[0]][1];p[2]=f[b[0]][2];
    p[3]=f[b[1]][0];p[4]=f[b[1]][1];p[5]=f[b[1]][2];
    g.attributes.position.needsUpdate=true;
  }
  for(let{spr,ji}of labels){
    spr.position.set(f[ji][0],f[ji][1]+0.06,f[ji][2]);
  }
  // Update angles
  let html='';
  for(let k of KIN_NAMES){
    const val=KIN[k][i];
    html+=`<div class="angle-row"><span>${k}</span><span class="angle-val">${val.toFixed(1)}°</span></div>`;
  }
  angleDiv.innerHTML=html;
  
  document.getElementById('slider').value=i;
  document.getElementById('finfo').textContent=`${i*ST+1}/1000`;
}

function tick(){idx=(idx+1)%N;show(idx);}
function start(){if(iv)clearInterval(iv);iv=setInterval(tick,1000/(24*spd));}
window.togglePlay=function(){playing=!playing;document.getElementById('btnPlay').textContent=playing?'⏸':'▶';if(playing)start();else clearInterval(iv);};
window.seek=function(v){idx=parseInt(v);show(idx);};
window.setSpd=function(s){spd=s;if(playing)start();};

// Initial view
const p0=F[0][0];
const c=new THREE.Vector3(p0[0],p0[1]+0.5,p0[2]);
ctrl.target.copy(c);
camera.position.set(c.x+2,c.y+0.8,c.z+2);
ctrl.update();

show(0);start();
(function a(){requestAnimationFrame(a);ctrl.update();renderer.render(scene,camera);})();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'){idx=Math.min(idx+1,N-1);show(idx);}
  if(e.code==='ArrowLeft'){idx=Math.max(idx-1,0);show(idx);}
});
