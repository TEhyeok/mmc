const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f1a);
scene.fog = new THREE.Fog(0x0f0f1a, 800, 2000);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 0.8);
dl.position.set(100, 200, 100);
scene.add(dl);

// Grid (larger)
const grid = new THREE.GridHelper(600, 30, 0x333366, 0x1a1a33);
scene.add(grid);

// Axes
scene.add(new THREE.AxesHelper(50));

// Legend
const legendDiv = document.getElementById('legend');

// Cameras
const CAM_SIZE = 8;
const ARROW_LEN = 60;
const FRUSTUM_LEN = 50;

Object.entries(DATA.cameras).forEach(([name, cam]) => {
  const color = new THREE.Color(cam.color);
  const c = cam.center;
  const d = cam.direction;
  const cp = new THREE.Vector3(c[0], c[1], c[2]);

  // Camera body - box + pyramid
  const bodyGeo = new THREE.BoxGeometry(CAM_SIZE*1.8, CAM_SIZE*1.2, CAM_SIZE);
  const bodyMat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity: 0.85 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.copy(cp);
  const target = new THREE.Vector3(c[0]+d[0], c[1]+d[1], c[2]+d[2]);
  body.lookAt(target);
  scene.add(body);

  // Lens (small cylinder)
  const lensGeo = new THREE.CylinderGeometry(CAM_SIZE*0.4, CAM_SIZE*0.5, CAM_SIZE*0.4, 8);
  const lensMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
  const lens = new THREE.Mesh(lensGeo, lensMat);
  lens.position.copy(cp).add(new THREE.Vector3(d[0], d[1], d[2]).multiplyScalar(CAM_SIZE*0.7));
  lens.lookAt(target);
  lens.rotateX(Math.PI/2);
  scene.add(lens);

  // Label sprite
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = cam.color;
  ctx.font = 'bold 56px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(name, 256, 55);
  ctx.font = '32px sans-serif';
  ctx.fillStyle = '#cccccc';
  ctx.fillText('f=' + cam.focal + 'px', 256, 100);
  const tex = new THREE.CanvasTexture(canvas);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
  spr.position.set(c[0], c[1] + CAM_SIZE*3.5, c[2]);
  spr.scale.set(40, 10, 1);
  scene.add(spr);

  // Viewing direction arrow
  const arrowDir = new THREE.Vector3(d[0], d[1], d[2]).normalize();
  const arrow = new THREE.ArrowHelper(arrowDir, cp, ARROW_LEN, color, CAM_SIZE*1.2, CAM_SIZE*0.8);
  scene.add(arrow);

  // FOV frustum
  const fovH = Math.PI/3;
  const fovV = fovH * 0.56;
  const right = new THREE.Vector3(-d[2], 0, d[0]).normalize();
  const up = new THREE.Vector3().crossVectors(new THREE.Vector3(d[0],d[1],d[2]), right).normalize();
  const fd = new THREE.Vector3(d[0],d[1],d[2]).multiplyScalar(FRUSTUM_LEN);
  const hw = Math.tan(fovH/2) * FRUSTUM_LEN;
  const hh = Math.tan(fovV/2) * FRUSTUM_LEN;

  const corners = [
    cp.clone().add(fd).add(right.clone().multiplyScalar(hw)).add(up.clone().multiplyScalar(hh)),
    cp.clone().add(fd).add(right.clone().multiplyScalar(-hw)).add(up.clone().multiplyScalar(hh)),
    cp.clone().add(fd).add(right.clone().multiplyScalar(-hw)).add(up.clone().multiplyScalar(-hh)),
    cp.clone().add(fd).add(right.clone().multiplyScalar(hw)).add(up.clone().multiplyScalar(-hh)),
  ];

  // Frustum edges
  const pts = [cp,corners[0], cp,corners[1], cp,corners[2], cp,corners[3],
               corners[0],corners[1], corners[1],corners[2], corners[2],corners[3], corners[3],corners[0]];
  const fGeo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.LineSegments(fGeo, new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.35 })));

  // Semi-transparent frustum face
  const faceGeo = new THREE.BufferGeometry();
  const verts = new Float32Array([
    ...cp.toArray(), ...corners[0].toArray(), ...corners[1].toArray(),
    ...cp.toArray(), ...corners[1].toArray(), ...corners[2].toArray(),
    ...cp.toArray(), ...corners[2].toArray(), ...corners[3].toArray(),
    ...cp.toArray(), ...corners[3].toArray(), ...corners[0].toArray(),
  ]);
  faceGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  faceGeo.computeVertexNormals();
  const faceMat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.06, side: THREE.DoubleSide });
  scene.add(new THREE.Mesh(faceGeo, faceMat));

  // Legend
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = '<div class="legend-dot" style="background:'+cam.color+'"></div><b>' + name + '</b>&nbsp; f=' + cam.focal + 'px';
  legendDiv.appendChild(item);
});

// 3D Points
const pp = new Float32Array(DATA.points.length * 3);
const pc = new Float32Array(DATA.points.length * 3);
DATA.points.forEach((p, i) => {
  pp[i*3]=p[0]; pp[i*3+1]=p[1]; pp[i*3+2]=p[2];
  const cl=DATA.point_colors[i];
  pc[i*3]=cl[0]; pc[i*3+1]=cl[1]; pc[i*3+2]=cl[2];
});
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pp, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pc, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ size:1.5, vertexColors:true, transparent:true, opacity:0.4 })));

const cy = allCenters.reduce((s,c)=>s+c[1],0)/allCenters.length;
const cz = allCenters.reduce((s,c)=>s+c[2],0)/allCenters.length;
controls.target.set(cx, cy, cz);
camera.position.set(cx, cy + 300, cz + 250);
controls.update();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
